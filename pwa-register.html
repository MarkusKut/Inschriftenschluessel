<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const basePath =
        document.querySelector('meta[name="site-base-path"]')?.content || "/";

      const reg = await navigator.serviceWorker.register(`${basePath}sw.js`, {
        scope: basePath
      });

      function isStandaloneApp() {
        return (
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true
        );
      }

      // Do not show the toast in normal browser mode.
      // Service worker + precache still continue in the background.
      const shouldShowToast = isStandaloneApp();

      let toast = document.getElementById("offline-toast");
      if (!toast && shouldShowToast) {
        toast = document.createElement("div");
        toast.id = "offline-toast";
        document.body.appendChild(toast);
      }

      const STATE_KEY = "offline-cache-state";              // "loading" | "ready"
      const READY_VERSION_KEY = "offline-cache-ready-version";

      let hideTimer = null;
      let loadingTimer = null;

      function showLoading() {
        if (!shouldShowToast) return;
        clearTimeout(hideTimer);
        clearTimeout(loadingTimer);
        toast.classList.remove("ready");
        toast.innerHTML = 'Offline-Version wird geladen<span class="dots"></span>';
        toast.classList.add("show");
        localStorage.setItem(STATE_KEY, "loading");
      }

      function showReadyAndHide() {
        if (!shouldShowToast) return;
        clearTimeout(hideTimer);
        clearTimeout(loadingTimer);
        toast.classList.add("ready");
        toast.textContent = "Offline-Version vollständig geladen";
        toast.classList.add("show");

        hideTimer = setTimeout(() => {
          toast.classList.remove("show");
        }, 1800);
      }

      function hideImmediately() {
        if (!toast) return;
        clearTimeout(hideTimer);
        clearTimeout(loadingTimer);
        toast.classList.remove("show");
      }

      function askReady() {
        const worker =
          navigator.serviceWorker.controller ||
          reg.active ||
          reg.waiting ||
          reg.installing;

        if (worker) {
          worker.postMessage("offline-ready?");
        }
      }

      navigator.serviceWorker.addEventListener("message", (event) => {
        if (event.data?.type === "offline-ready") {
          const ready = !!event.data.ready;
          const version = event.data.version || "unknown";

          if (ready) {
            document.documentElement.setAttribute("data-offline-ready", "true");

            const previousState = localStorage.getItem(STATE_KEY);
            const shownVersion = localStorage.getItem(READY_VERSION_KEY);

            localStorage.setItem(STATE_KEY, "ready");

            if (previousState === "loading" && shownVersion !== version) {
              localStorage.setItem(READY_VERSION_KEY, version);
              showReadyAndHide();
            } else {
              hideImmediately();
            }
          } else {
            document.documentElement.setAttribute("data-offline-ready", "false");
            showLoading();
          }
        }
      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        askReady();
      });

      reg.addEventListener("updatefound", () => {
        showLoading();
      });

      if (shouldShowToast) {
        if (localStorage.getItem(STATE_KEY) === "loading") {
          showLoading();
        } else {
          hideImmediately();
        }

        loadingTimer = setTimeout(() => {
          if (document.documentElement.getAttribute("data-offline-ready") !== "true") {
            showLoading();
          }
        }, 500);
      }

      navigator.serviceWorker.ready.then(() => {
        askReady();
      });

    } catch (err) {
      console.error("Service worker registration failed:", err);
    }
  });
}
</script>
