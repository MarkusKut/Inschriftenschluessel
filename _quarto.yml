project:
  type: website
  output-dir: docs
  post-render:
    - Rscript R/make_precache.R
    - Rscript R/make_changelog.R
  resources:
    - sw.js
    - site.webmanifest
    - offline.html
    - icons/**
    - favicon.ico

lang: de # Sets language to German

website:
  title: "Inschriftenschlüssel"
  navbar:
    left:
      - href: pages/info.qmd
        text: "Information"
      - href: pages/seltenHierogl.qmd
        text: "Seltene Hierogylphen"
      - href: pages/projekt.qmd
        text: "Projekt"



format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: assets/css/site.css
    toc: true
    toc-location: left
    page-layout: full
    code-fold: true
    code-tools: false
    include-in-header: pwa-head.html
    include-after-body: pwa-register.html
    

execute:
  freeze: auto

